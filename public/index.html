<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loja de Calcados - Chatbot</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:wght@400;600&family=Hanken+Grotesk:wght@400;600&display=swap"
    />
    <script src="https://www.gstatic.com/dialogflow-console/fast/messenger/bootstrap.js?v=1"></script>
  </head>
  <body>
    <main class="layout">
      <header class="brand">
        <p class="brand__tag">CHATBOT DA LOJA</p>
        <h1 class="brand__title">Loja de Calcados</h1>
        <p class="brand__text">
          Converse com nosso assistente para ver o catalogo e fechar seu pedido.
        </p>
      </header>

      <section class="chat-shell">
        <df-messenger
          intent="WELCOME"
          chat-title="Loja de Calcados"
          agent-id="ddda8e8b-56c3-4513-b4d4-b693d16e6dcd"
          language-code="pt-br"
        ></df-messenger>
      </section>
    </main>
  </body>
</html>
